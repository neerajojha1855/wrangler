<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrangler - Your Travel Agent</title>
    <link href="/src/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body class="bg-wrangler-ivory text-wrangler-black font-mono p-4 md:p-8">

    <header class="border-3 border-wrangler-black p-4 mb-8 bg-wrangler-yellow shadow-neo-md">
        <h1 class="text-2xl font-bold tracking-tighter uppercase">[W R A N G L E R]</h1>
        <p class="text-sm">STATUS: OFFLINE-READY</p>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Controls Panel -->
        <section class="border-3 border-wrangler-black p-6 bg-white shadow-neo-md col-span-1">
            <h2 class="font-bold mb-4 border-b-3 border-wrangler-black pb-2">INPUT VECTORS</h2>
            
            <label class="block mb-2 text-sm font-bold">CITY:</label>
            <input type="text" id="cityInput" class="w-full border-3 border-wrangler-black p-2 mb-4 bg-wrangler-ivory" placeholder="e.g. Gwalior">
            
            <label class="block mb-2 text-sm font-bold">BUDGET (Local):</label>
            <input type="number" id="budgetInput" class="w-full border-3 border-wrangler-black p-2 mb-4 bg-wrangler-ivory" placeholder="25000">

            <label class="block mb-2 text-sm font-bold">VIBE:</label>
            <textarea id="vibeInput" class="w-full border-3 border-wrangler-black p-2 mb-6 bg-wrangler-ivory" rows="3" placeholder="Extreme budget backpacker..."></textarea>

            <button id="generateBtn" class="w-full bg-wrangler-red text-white font-bold py-3 border-3 border-wrangler-black hover:-translate-y-1 hover:shadow-neo-md transition-all">
                [!] GENERATE ROUTE
            </button>
        </section>

        <!-- Map & Output Panel -->
        <section class="lg:col-span-2 space-y-8">
            <div id="map" class="h-64 border-3 border-wrangler-black shadow-neo-md bg-gray-200 z-0"></div>
            
            <div class="border-3 border-wrangler-black p-6 bg-white shadow-neo-md">
                <h2 class="font-bold mb-4 border-b-3 border-wrangler-black pb-2">TERMINAL OUTPUT</h2>
                <div id="terminalOutput" class="whitespace-pre-wrap text-sm h-64 overflow-y-auto bg-gray-100 p-4 border border-wrangler-black">
                    > AWAITING DIRECTIVES...
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/map.js"></script>
</body>
</html>
